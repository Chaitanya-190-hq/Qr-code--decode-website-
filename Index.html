<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChaiQR Encoder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🔐 ChaiQR Encoder</h1>

    <textarea id="message" placeholder="Enter secret message"></textarea>
    <input type="password" id="password" placeholder="Secret Password">

    <button onclick="generateQR()">Generate QR</button>

    <div id="encryptedBox"></div>
    <div id="qrcode"></div>

    <a href="decoder.html">Open Decoder →</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
